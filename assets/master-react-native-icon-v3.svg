<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bgGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D2A44"/>
      <stop offset="100%" style="stop-color:#070C17"/>
    </linearGradient>

    <linearGradient id="orbitGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#61DAFB"/>
      <stop offset="100%" style="stop-color:#21B6E0"/>
    </linearGradient>

    <linearGradient id="cyanShimmer" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#61DAFB;stop-opacity:0.15"/>
      <stop offset="50%" style="stop-color:#61DAFB;stop-opacity:0.55"/>
      <stop offset="100%" style="stop-color:#61DAFB;stop-opacity:0.15"/>
    </linearGradient>

    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF9A3C"/>
      <stop offset="100%" style="stop-color:#E8632A"/>
    </linearGradient>

    <radialGradient id="nucleusGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#FFFFFF"/>
      <stop offset="40%" style="stop-color:#61DAFB"/>
      <stop offset="100%" style="stop-color:#1A8FB5;stop-opacity:0"/>
    </radialGradient>

    <filter id="orbitGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="nucleusGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="textGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="orangeGlow" x="-20%" y="-40%" width="140%" height="180%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#61DAFB" stroke-width="0.4" opacity="0.07"/>
    </pattern>

    <clipPath id="iconClip">
      <rect width="1024" height="1024" rx="224" ry="224"/>
    </clipPath>
  </defs>

  <g clip-path="url(#iconClip)">
    <rect width="1024" height="1024" fill="url(#bgGlow)"/>
    <rect width="1024" height="1024" fill="url(#grid)"/>

    <rect x="312" y="54" width="400" height="68" rx="34" fill="url(#orangeGrad)" filter="url(#orangeGlow)"/>
    <rect x="312" y="54" width="400" height="34" rx="34" fill="white" opacity="0.12"/>
    <text
      x="512" y="101"
      font-family="'Trebuchet MS', 'Segoe UI', sans-serif"
      font-size="26"
      font-weight="800"
      letter-spacing="5"
      text-anchor="middle"
      fill="white"
    >&#9733;  PRO COURSE  &#9733;</text>

    <ellipse cx="512" cy="450" rx="290" ry="100" fill="none" stroke="url(#orbitGrad)" stroke-width="5.5" opacity="0.92" filter="url(#orbitGlow)"/>
    <ellipse cx="512" cy="450" rx="290" ry="100" fill="none" stroke="url(#orbitGrad)" stroke-width="5.5" opacity="0.92" transform="rotate(60 512 450)" filter="url(#orbitGlow)"/>
    <ellipse cx="512" cy="450" rx="290" ry="100" fill="none" stroke="url(#orbitGrad)" stroke-width="5.5" opacity="0.92" transform="rotate(120 512 450)" filter="url(#orbitGlow)"/>

    <circle cx="802" cy="450" r="14" fill="#61DAFB" filter="url(#nucleusGlow)" opacity="0.95"/>
    <circle cx="802" cy="450" r="14" fill="#61DAFB" filter="url(#nucleusGlow)" opacity="0.95" transform="rotate(60 512 450)"/>
    <circle cx="802" cy="450" r="14" fill="#61DAFB" filter="url(#nucleusGlow)" opacity="0.95" transform="rotate(120 512 450)"/>

    <circle cx="512" cy="450" r="55" fill="url(#nucleusGrad)" filter="url(#nucleusGlow)"/>
    <circle cx="512" cy="450" r="36" fill="#61DAFB" opacity="0.95"/>
    <circle cx="512" cy="450" r="21" fill="white" opacity="0.92"/>

    <rect x="448" y="298" width="128" height="220" rx="20" fill="none" stroke="#61DAFB" stroke-width="3" opacity="0.13"/>
    <rect x="489" y="498" width="46" height="6" rx="3" fill="#61DAFB" opacity="0.15"/>

    <rect x="80" y="756" width="864" height="204" rx="102" fill="#060D1C" opacity="0.90"/>
    <rect x="80" y="756" width="864" height="204" rx="102" fill="url(#cyanShimmer)" opacity="0.06"/>

    <text
      x="512" y="842"
      font-family="'Trebuchet MS', 'Segoe UI', sans-serif"
      font-size="84"
      font-weight="900"
      letter-spacing="18"
      text-anchor="middle"
      fill="#FFFFFF"
      filter="url(#textGlow)"
    >MASTER</text>

    <line x1="170" y1="857" x2="854" y2="857" stroke="#61DAFB" stroke-width="1.5" opacity="0.3"/>

    <text
      x="512" y="918"
      font-family="'Trebuchet MS', 'Segoe UI', sans-serif"
      font-size="38"
      font-weight="500"
      letter-spacing="12"
      text-anchor="middle"
      fill="#61DAFB"
      opacity="0.92"
    >REACT NATIVE</text>

    <rect x="0" y="0" width="1024" height="6" fill="url(#cyanShimmer)" opacity="0.5"/>
  </g>
</svg>
