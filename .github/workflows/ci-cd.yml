name: Mobile App CI/CD

on:
  pull_request:
    branches: [master, main]
  push:
    branches: [master, main]
  workflow_dispatch:

concurrency:
  group: mobile-app-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Expo Config Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Validate Expo config
        run: npx expo config --type public

  deploy-ota:
    name: EAS Update (OTA)
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check Expo token
        id: token_check
        run: |
          if [ -z "${{ secrets.EXPO_TOKEN }}" ]; then
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "EXPO_TOKEN is missing. OTA update will be skipped."
          else
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node
        if: steps.token_check.outputs.should_run == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Expo and EAS
        if: steps.token_check.outputs.should_run == 'true'
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        if: steps.token_check.outputs.should_run == 'true'
        run: npm ci

      - name: Publish OTA update
        if: steps.token_check.outputs.should_run == 'true'
        run: |
          npx eas update --branch production --message "CI OTA update: ${{ github.sha }}" --non-interactive
